<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — The Dispatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">THE DISPATCH</a>
      <nav class="site-nav">
        <a href="terminal.html" class="nav-btn">Enter Terminal</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="join.html" class="nav-link join-link">Join</a>
      </nav>
      <button class="hamburger" id="hamburger">&#9776;</button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="terminal.html" class="nav-btn">Enter Terminal</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="join.html">Join</a>
    </div>
  </header>

  <main>
    <div class="page-wrap fade-in">
      <h1>Contact</h1>
      <p>Have a question or want to get in touch? Fill in the form below.</p>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message here..."></textarea>
      </div>
      <button class="submit-btn">Send Message</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 The Dispatch. All rights reserved.</p>
  </footer>
  <script src="main.js"></script>
</body>
</html>
